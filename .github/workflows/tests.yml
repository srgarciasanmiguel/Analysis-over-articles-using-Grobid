name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:

  # ── Fast: no GROBID needed, runs on every commit ──────────────────
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests (no GROBID)
        run: pytest tests/unit/unit_tests.py -v

  # ── Slow: real GROBID, runs on push to main or nightly ────────────
  integration-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'

    services:
      grobid:
        image: lfoppiano/grobid:0.8.0
        ports:
          - 8070:8070

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.3"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Wait for GROBID to be ready
        run: |
          echo "Waiting for GROBID..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8070/api/isalive)
            if [ "$STATUS" = "200" ]; then
              echo "GROBID is up after $i attempts!"
              exit 0
            fi
            echo "Attempt $i — got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "GROBID never became healthy"
          exit 1

      - name: Run integration tests (real GROBID)
        run: pytest tests/integration/int_tests.py -v
        env:
          GROBID_URL: http://localhost:8070
