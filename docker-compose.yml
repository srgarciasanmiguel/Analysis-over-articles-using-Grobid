services:

  grobid:
    image: grobid/grobid:0.8.2-crf
    container_name: grobid
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8070'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s

  grobid_analysis:
    build: .
    container_name: grobid_analysis
    depends_on:
      grobid:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1